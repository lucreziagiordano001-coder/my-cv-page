<html lang="it">
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- SEO Base -->
<meta name="description" content="Portfolio di Lucrezia Giordano, Junior Full Stack Developer. Scopri le mie competenze, il mio percorso e i progetti realizzati.">

<!-- Open Graph / Facebook / LinkedIn -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://lucreziagiordano001-coder.github.io/mycvpage/">
<meta property="og:title" content="Lucrezia Giordano | Full Stack Developer Portfolio">
<meta property="og:description" content="Esplora i progetti e le competenze di sviluppo web di Lucrezia Giordani.">
<meta property="og:image" content="https://lucreziagiordano001-coder.github.io/mycvpage/assets/img/preview.jpg">

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <!-- SCRIPT EMAILJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          // Incolla qui la tua Public Key quando ti registri su EmailJS
          emailjs.init("LA_TUA_PUBLIC_KEY_DI_EMAILJS");
       })();
    </script>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- NAVBAR STICKY -->
    <nav class="navbar navbar-expand-md navbar-light sticky-top custom-navbar">
        <div class="container">
            <a class="navbar-brand nav-logo d-flex align-items-center gap-2" href="index.html">
               <img src="assets/img/LG.png" alt="Logo Lucrezia Giordano" width="32" height="32" class="d-inline-block align-text-top navbar-logo-img">
               Lucrezia Giordano
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html#about">Chi Sono</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#skills">Competenze</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#path">Mondo Lucrezia</a></li>
                    <li class="nav-item"><a class="nav-link btn-nav-contact active" href="contattami.html">Contattami</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTAINER DEL FORM -->
    <main class="container my-5 py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="contact-card p-4 p-md-5">
                    <h2 class="section-title mb-3">Mettiamoci in Contatto</h2>
                    <p class="text-muted mb-4">Compila il form sottostante. Riceverò il tuo messaggio in tempo reale!</p>
                    
                    <!-- FORM -->
                    <form id="contact-form">
                        <div class="mb-3">
                            <label for="user_name" class="form-label fw-semibold">Nome / Azienda</label>
                            <input type="text" class="form-control custom-input" id="user_name" name="user_name" required placeholder="Inserisci il tuo nome">
                        </div>
                        <div class="mb-3">
                            <label for="user_email" class="form-label fw-semibold">Indirizzo Email</label>
                            <input type="email" class="form-control custom-input" id="user_email" name="user_email" required placeholder="nome@azienda.com">
                        </div>
                        <div class="mb-4">
                            <label for="message" class="form-label fw-semibold">Messaggio</label>
                            <textarea class="form-control custom-input" id="message" name="message" rows="5" required placeholder="Parliamo del tuo prossimo progetto software o linguistico..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100 py-3">Invia Messaggio</button>
                    </form>
                    
                    <div id="form-status" class="mt-3 text-center fw-semibold"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer text-center mt-5">
        <div class="container">
            <p class="copy mb-0">&copy; 2026 Lucrezia Giordano. Proiettata verso il futuro.</p>
        </div>
    </footer>

    <!-- LOGICA DI INVIO MESSAGGIO -->
    <script>
        document.getElementById('contact-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const statusDiv = document.getElementById('form-status');
            statusDiv.innerText = "Invio in corso... ⏳";
            statusDiv.style.color = "#7928ca";

            // Sostituisci "YOUR_SERVICE_ID" e "YOUR_TEMPLATE_ID" con i tuoi dati EmailJS
            emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
                .then(() => {
                    statusDiv.innerText = "Messaggio inviato con successo! 🚀 Ti risponderò prestissimo.";
                    statusDiv.style.color = "green";
                    document.getElementById('contact-form').reset();
                }, (error) => {
                    statusDiv.innerText = "Errore durante l'invio. ❌ Riprova o scrivimi a lucreziagiordano1@gmail.com";
                    statusDiv.style.color = "red";
                    console.error('EmailJS Error:', error);
                });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
